<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スクラッチ風ペイントエディタ</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            /* スマホで変なズームをしないようにする */
            touch-action: manipulation;
        }
        h1 {
            color: #4c3e99;
            font-size: 18px;
            margin: 5px 0 10px 0;
        }
        /* メインの作業画面（スマホ用に縦ならびにも対応） */
        .editor-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            background: #ffffff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            max-width: 100%;
        }
        /* 左側ツールバー */
        .toolbar {
            display: grid;
            grid-template-columns: repeat(2, 40px);
            grid-gap: 8px;
            align-content: start;
        }
        /* ツールボタン */
        .tool-btn {
            width: 40px;
            height: 40px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn.active {
            background-color: #855cd6;
            color: white;
            border-color: #855cd6;
        }
        /* 右側のキャンバスエリア */
        .canvas-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        /* 上の設定バー */
        .top-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f0f4f8;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        canvas {
            background-color: white;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            /* ⚠️これが重要！スマホで指を動かしたときに画面がスクロールするのを防ぐ */
            touch-action: none;
            max-width: 100%;
            height: auto;
        }
        input[type="number"] {
            width: 35px;
            padding: 2px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .action-btn {
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .download-btn {
            background-color: #4cab52;
            color: white;
        }
        .clear-btn {
            background-color: #ff4d4d;
            color: white;
        }
    </style>
</head>
<body>

    <h1>🎨 スクラッチ風ペイントエディタ</h1>

    <div class="editor-container">
        <!-- ツールバー -->
        <div class="toolbar">
            <button class="tool-btn active" id="select" title="選択">↖️</button>
            <button class="tool-btn" id="reshape" title="形を変える">⬈</button>
            <button class="tool-btn" id="brush" title="筆">🖌️</button>
            <button class="tool-btn" id="eraser" title="消しゴム">🧼</button>
            <button class="tool-btn" id="bucket" title="塗りつぶし">🪣</button>
            <button class="tool-btn" id="text" title="テキスト">Ｔ</button>
            <button class="tool-btn" id="line" title="直線">╱</button>
            <button class="tool-btn" id="circle" title="円">◯</button>
            <button class="tool-btn" id="rect" title="長方形">⬜</button>
        </div>

        <!-- キャンバスエリア -->
        <div class="canvas-area">
            <div class="top-bar">
                <label>色: <input type="color" id="colorPicker" value="#855cd6"></label>
                <label>太さ: <input type="number" id="lineWidth" min="1" max="100" value="8"></label>
                <button class="action-btn download-btn" id="downloadBtn">💾 保存</button>
                <button class="action-btn clear-btn" id="clearBtn">🗑️ 消す</button>
            </div>
            <!-- スマホで見やすいように少し小さめのサイズ（360x360）に調整 -->
            <canvas id="paintCanvas" width="360" height="360"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const buttons = document.querySelectorAll('.tool-btn');

        let drawing = false;
        let currentMode = 'select';
        let startX, startY;
        let snapshot;

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.id;
            });
        });

        // マウスや指が「どこを触っているか」を正しく計算する関数
        function getXY(e) {
            const rect = canvas.getBoundingClientRect();
            // 指（タッチ）かマウスかを判定する
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // キャンバスの実際のサイズと、画面で見えているサイズの違いを直す計算
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);
            return { x, y };
        }

        // 描き始め
        function startDrawing(e) {
            drawing = true;
            const pos = getXY(e);
            startX = pos.x;
            startY = pos.y;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (currentMode === 'brush' || currentMode === 'eraser') {
                draw(e);
            }
        }

        // 動かしているとき
        function draw(e) {
            if (!drawing) return;
            // スマホの画面スクロールを止める
            if (e.cancelable) e.preventDefault();

            const pos = getXY(e);
            const currentX = pos.x;
            const currentY = pos.y;

            ctx.lineWidth = lineWidth.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentMode === 'brush') {
                ctx.strokeStyle = colorPicker.value;
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'line') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'rect') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
            } 
            else if (currentMode === 'circle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                let radius = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
                ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }

        // 指やマウスを離したとき
        function stopDrawing(e) {
            if (!drawing) return;
            drawing = false;

            // タッチ終了時は最後の位置を正確に取るのが難しいため、startX/startYの近くか直前の位置を使います
            if (currentMode === 'bucket') {
                ctx.fillStyle = colorPicker.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            else if (currentMode === 'text') {
                let text = prompt("いれたい文字を入力してね：");
                if (text) {
                    ctx.fillStyle = colorPicker.value;
                    ctx.font = `${lineWidth.value * 3}px sans-serif`;
                    ctx.fillText(text, startX, startY);
                }
            }

            ctx.beginPath();
        }

        // パソコン用のマウスイベント
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);

        // 📱 スマホ・タブレット用のタッチイベント（追加！）
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', stopDrawing);

        // ゴミ箱
        clearBtn.addEventListener('click', () => {
            if (confirm('ぜんぶ消しちゃって大丈夫？')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        // 保存
        downloadBtn.addEventListener('click', () => {
            const imageURI = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'my_scratch_picture.png';
            link.href = imageURI;
            link.click();
        });
    </script>

</body>
</html>
