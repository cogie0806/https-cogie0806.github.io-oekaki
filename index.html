<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>画像編集ペイントエディタ</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        h1 {
            color: #4c3e99;
            font-size: 18px;
            margin: 5px 0 10px 0;
        }
        .editor-container {
            display: flex;
            flex-direction: row;
            gap: 10px;
            background: #ffffff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            max-width: 100%;
        }
        .toolbar {
            display: grid;
            grid-template-columns: repeat(2, 40px);
            grid-gap: 8px;
            align-content: start;
        }
        .tool-btn {
            width: 40px;
            height: 40px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn.active {
            background-color: #855cd6;
            color: white;
            border-color: #855cd6;
        }
        .canvas-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .top-bar {
            display: flex;
            gap: 8px;
            align-items: center;
            background: #f0f4f8;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            flex-wrap: wrap;
        }
        canvas {
            background-color: white;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            touch-action: none !important;
        }
        input[type="number"] {
            width: 35px;
            padding: 2px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .action-btn {
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }
        .upload-label {
            background-color: #ff9800;
            color: white;
            padding: 5px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }
        .download-btn {
            background-color: #4cab52;
            color: white;
        }
        .clear-btn {
            background-color: #ff4d4d;
            color: white;
        }
        #imageUpload {
            display: none;
        }
    </style>
</head>
<body>

    <h1>🎨 画像編集ペイントエディタ</h1>

    <div class="editor-container">
        <div class="toolbar">
            <button class="tool-btn active" id="select" title="選択">↖️</button>
            <button class="tool-btn" id="reshape" title="形を変える">⬈</button>
            <button class="tool-btn" id="brush" title="筆">🖌️</button>
            <button class="tool-btn" id="eraser" title="消しゴム">🧼</button>
            <button class="tool-btn" id="bucket" title="塗りつぶし">🪣</button>
            <button class="tool-btn" id="text" title="テキスト">Ｔ</button>
            <button class="tool-btn" id="line" title="直線">╱</button>
            <button class="tool-btn" id="circle" title="円">◯</button>
            <button class="tool-btn" id="rect" title="長方形">⬜</button>
        </div>

        <div class="canvas-area">
            <div class="top-bar">
                <label class="upload-label" for="imageUpload">📂 画像をひらく</label>
                <input type="file" id="imageUpload" accept="image/*">

                <label>色: <input type="color" id="colorPicker" value="#855cd6"></label>
                <label>太さ: <input type="number" id="lineWidth" min="1" max="100" value="8"></label>
                <button class="action-btn download-btn" id="downloadBtn">💾 保存</button>
                <button class="action-btn clear-btn" id="clearBtn">🗑️ 消す</button>
            </div>
            <canvas id="paintCanvas" width="300" height="300"></canvas>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const imageUpload = document.getElementById('imageUpload');
        const buttons = document.querySelectorAll('.tool-btn');

        let drawing = false;
        let currentMode = 'select';
        let startX, startY;
        let snapshot;

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.id;
            });
        });

        // 📸 画像をえらんだときのプログラム
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
                    const x = (canvas.width / 2) - (img.width / 2) * scale;
                    const y = (canvas.height / 2) - (img.height / 2) * scale;
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (canvas.width / rect.width),
                y: (e.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        // 🚀 タッチ・マウスを押したとき
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);
            drawing = true;
            
            const pos = getCanvasPos(e);
            startX = pos.x;
            startY = pos.y;
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (currentMode === 'brush' || currentMode === 'eraser') {
                handleDrawMove(pos.x, pos.y);
            }
        });

        // 🚀 動かしているとき
        canvas.addEventListener('pointermove', (e) => {
            e.preventDefault();
            if (!drawing) return;
            const pos = getCanvasPos(e);
            handleDrawMove(pos.x, pos.y);
        });

        // 🚀 はなしたとき
        canvas.addEventListener('pointerup', (e) => {
            e.preventDefault();
            if (!drawing) return;
            drawing = false;
            canvas.releasePointerCapture(e.pointerId);
            handleDrawEnd();
        });

        function handleDrawMove(currentX, currentY) {
            ctx.lineWidth = lineWidth.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentMode === 'brush') {
                ctx.strokeStyle = colorPicker.value;
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'line') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'rect') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
            } 
            else if (currentMode === 'circle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                let radius = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
                ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }

        function handleDrawEnd() {
            if (currentMode === 'bucket') {
                ctx.fillStyle = colorPicker.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            else if (currentMode === 'text') {
                let text = prompt("いれたい文字を入力してね：");
                if (text) {
                    ctx.fillStyle = colorPicker.value;
                    ctx.font = `${lineWidth.value * 3}px sans-serif`;
                    ctx.fillText(text, startX, startY);
                }
            }
            ctx.beginPath();
        }

        clearBtn.addEventListener('click', () => {
            if (confirm('ぜんぶ消しちゃって大丈夫？')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        downloadBtn.addEventListener('click', () => {
            const imageURI = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'edited_picture.png';
            link.href = imageURI;
            link.click();
        });
    </script>

</body>
</html>
